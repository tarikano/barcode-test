<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Тест камери</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }
        video {
            width: 90%;
            max-width: 500px;
            border: 2px solid #333;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Тест камери</h1>
<p>Якщо камера працює — нижче зʼявиться відео з неї.</p>

<video id="video" autoplay playsinline></video>

<script>
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }
            });
            document.getElementById("video").srcObject = stream;
        } catch (err) {
            alert("Помилка доступу до камери: " + err);
        }
    }

    startCamera();
</script>

</body>
</html>
