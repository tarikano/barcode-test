<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Fast Barcode Scanner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }
        video {
            width: 90%;
            max-width: 500px;
            border: 2px solid #333;
            border-radius: 10px;
            margin-top: 20px;
        }
        #result {
            margin-top: 20px;
            font-size: 24px;
            color: green;
        }
    </style>
</head>
<body>

<h1>Швидкий сканер штрихкодів</h1>
<p>Наведи камеру на штрихкод — результат зʼявиться швидше.</p>

<video id="video" autoplay playsinline></video>
<div id="result">Очікування…</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>
    const video = document.getElementById('video');
    const resultBox = document.getElementById('result');

    const codeReader = new ZXing.BrowserBarcodeReader();

    async function start() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: "environment",
                    width: { ideal: 640 },
                    height: { ideal: 480 },
                    frameRate: { ideal: 15 }
                }
            });

            video.srcObject = stream;

            // Аналіз кожні 300 мс
            setInterval(async () => {
                try {
                    const result = await codeReader.decodeOnceFromVideoElement(video);
                    if (result) {
                        resultBox.innerText = "Знайдено: " + result.text;
                    }
                } catch (e) {
                    // ігноруємо помилки, поки не знайдено код
                }
            }, 300);

        } catch (err) {
            resultBox.innerText = "Помилка: " + err;
        }
    }

    start();
</script>

</body>
</html>
