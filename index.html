<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Barcode Scanner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }
        video {
            width: 90%;
            max-width: 500px;
            border: 2px solid #333;
            border-radius: 10px;
            margin-top: 20px;
        }
        #result {
            margin-top: 20px;
            font-size: 24px;
            color: green;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h1>Сканер штрихкодів</h1>
<p>Наведи камеру на штрихкод — результат зʼявиться нижче.</p>

<video id="video" autoplay playsinline></video>

<div id="result">Очікування сканування…</div>

<button onclick="copyCode()">Скопіювати код</button>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>
    const codeReader = new ZXing.BrowserMultiFormatReader();
    const video = document.getElementById('video');
    const resultBox = document.getElementById('result');

    async function startScanner() {
        try {
            const devices = await codeReader.listVideoInputDevices();
            const backCamera = devices.find(d => d.label.toLowerCase().includes("back")) || devices[0];

            await codeReader.decodeFromVideoDevice(backCamera.deviceId, video, (result, err) => {
                if (result) {
                    resultBox.innerText = "Знайдено: " + result.text;
                    window.lastCode = result.text;
                }
            });
        } catch (e) {
            resultBox.innerText = "Помилка: " + e;
        }
    }

    function copyCode() {
        if (!window.lastCode) return alert("Немає коду для копіювання");
        navigator.clipboard.writeText(window.lastCode);
        alert("Код скопійовано!");
    }

    startScanner();
</script>

</body>
</html>
